---
layout: archive
permalink: /research/
title: "Research"
author_profile: true
---

<style>
.research-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 2rem;
  margin-top: 1.5rem;
}

.research-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  object-position: top;
  border-radius: 4px;
  border: 1px solid #e5e5e5;
}

.research-card h2 {
  margin: 0.7rem 0 0.3rem;
  font-size: 1.2rem;
}

.research-card p {
  margin: 0;
}

@media (max-width: 700px) {
  .research-grid {
    grid-template-columns: 1fr;
  }
}
</style>

<div class="research-grid">
{% for post in site.posts %}
  <article class="research-card">
    <a href="{{ post.url | relative_url }}">
      <img
        src="{{ post.header.teaser | relative_url }}"
        alt="{{ post.title }}"
      >
    </a>

    <h2>
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h2>

    {% if post.excerpt %}
      <p>{{ post.excerpt | strip_html }}</p>
    {% endif %}
  </article>
{% endfor %}
</div>
