---
layout: archive
permalink: /research/
title: "Research"
author_profile: true
---

<style>
.research-list {
  margin-top: 1.5rem;
}

.research-card {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 1.5rem;
  align-items: start;
  margin-bottom: 2.5rem;
}

.research-card img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  object-position: top;
  border-radius: 4px;
  border: 1px solid #e5e5e5;
}

.research-card h2 {
  margin: 0 0 0.5rem;
  font-size: 1.3rem;
}

.research-card p {
  margin: 0;
  line-height: 1.6;
}

@media (max-width: 800px) {
  .research-card {
    grid-template-columns: 1fr;
  }

  .research-card img {
    height: auto;
  }
}
</style>

<div class="research-list">
{% for post in site.posts %}
  <article class="research-card">
    <a href="{{ post.url | relative_url }}">
      <img
        src="{{ post.header.teaser | relative_url }}"
        alt="{{ post.title }}"
      >
    </a>

    <div>
      <h2>
        <a href="{{ post.url | relative_url }}">
          {{ post.title }}
        </a>
      </h2>

      {% if post.excerpt %}
        <p>{{ post.excerpt | strip_html }}</p>
      {% endif %}
    </div>
  </article>
{% endfor %}
</div>
